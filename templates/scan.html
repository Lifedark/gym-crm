{% extends "base.html" %}
{% block title %}Skanuj QR - {{ app_name }}{% endblock %}
{% block content %}
<div class="row animate-in">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm mb-3">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-qr-code-scan"></i> Skanuj kod QR karnetu</h5>
            </div>
            <div class="card-body text-center">
                <div id="qr-reader" style="width: 100%; max-width: 400px; margin: 0 auto;"></div>
                <div id="result" class="mt-3"></div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">
                <h6 class="mb-0"><i class="bi bi-keyboard"></i> Lub wpisz kod ręcznie</h6>
            </div>
            <div class="card-body">
                <form id="manualForm" class="row g-2">
                    <div class="col-md-8">
                        <input type="text" id="manualCode" class="form-control form-control-lg" placeholder="Wpisz kod QR..." autofocus>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="bi bi-search"></i> Sprawdź
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const resultDiv = document.getElementById('result');

function showMember(member) {
    const entriesInfo = member.entries_left !== '' && member.entries_left !== null
        ? `<p class="mb-1">Pozostało wejść: <strong>${member.entries_left}</strong></p>` : '';
    resultDiv.innerHTML = `
        <div class="card border-${member.status === 'active' ? 'success' : 'danger'} animate-in">
            <div class="card-body text-center">
                <h4 class="fw-bold">${member.name}</h4>
                <p class="text-muted mb-1">Kod: ${member.qr_code}</p>
                <p class="mb-1">Karnet: ${member.membership_type}</p>
                ${member.end_date ? `<p class="mb-1">Ważny do: ${member.end_date}</p>` : ''}
                ${entriesInfo}
                <span class="badge fs-5 bg-${member.status === 'active' ? 'success' : 'danger'} mt-2">
                    ${member.status === 'active' ? 'Aktywny' : 'Wygasły/Zamrożony'}
                </span>
                ${member.status === 'active' ? `
                    <button onclick="checkin('${member.qr_code}')" class="btn btn-success btn-lg mt-3 w-100">
                        <i class="bi bi-check-circle-fill"></i> ZALICZ WEJŚCIE
                    </button>
                ` : ''}
            </div>
        </div>
    `;
}

function showMessage(success, text) {
    resultDiv.innerHTML = `<div class="alert alert-${success ? 'success' : 'danger'} text-center fs-5 animate-in">${text}</div>`;
    if (success) setTimeout(() => { resultDiv.innerHTML = ''; }, 3000);
}

function lookupCode(code) {
    code = code.trim().toUpperCase();
    if (!code) return;
    fetch(`/api/member/${code}`).then(r => r.json()).then(data => {
        data.found ? showMember(data.member) : showMessage(false, 'Nie znaleziono klienta o kodzie: ' + code);
    }).catch(() => showMessage(false, 'Błąd połączenia z serwerem.'));
}

function checkin(code) {
    fetch(`/api/checkin/${code}`, { method: 'POST' }).then(r => r.json()).then(data => {
        showMessage(data.success, data.message);
    }).catch(() => showMessage(false, 'Błąd podczas zapisywania wejścia.'));
}

document.getElementById('manualForm').addEventListener('submit', function(e) {
    e.preventDefault();
    lookupCode(document.getElementById('manualCode').value);
    document.getElementById('manualCode').value = '';
});

function onScanSuccess(decodedText) {
    document.getElementById('qr-reader').style.display = 'none';
    lookupCode(decodedText);
    setTimeout(() => { document.getElementById('qr-reader').style.display = 'block'; }, 3000);
}

const html5QrCode = new Html5Qrcode("qr-reader");
html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScanSuccess
).catch(() => {
    resultDiv.innerHTML = `<div class="alert alert-warning"><i class="bi bi-camera"></i> Nie można uruchomić kamery. Użyj pola ręcznego.</div>`;
});
</script>
{% endblock %}
