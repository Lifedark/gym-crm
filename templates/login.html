<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - {{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        #particle-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
        }
        .login-card {
            position: relative; z-index: 1;
            background: rgba(8,15,10,0.8);
            backdrop-filter: blur(30px) saturate(1.5);
            -webkit-backdrop-filter: blur(30px) saturate(1.5);
            border: 1px solid rgba(16,185,129,0.08);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            width: 100%; max-width: 420px;
            padding: 2.5rem;
            animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes cardIn {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-logo {
            font-size: 3.5rem; display: inline-block;
            animation: floatLogo 3s ease-in-out infinite;
            background: linear-gradient(135deg, #10b981, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .brand-text {
            background: linear-gradient(135deg, #10b981, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .form-control {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(16,185,129,0.08);
            border-radius: 12px; color: #f0f0f0;
            padding: 0.8rem 1rem; font-size: 0.95rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.1), 0 0 20px rgba(16,185,129,0.1);
            background: rgba(255,255,255,0.06);
            color: #f0f0f0;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.2); }
        .input-group-text {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(16,185,129,0.08);
            color: rgba(255,255,255,0.3);
            border-radius: 12px;
        }
        .btn-login {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none; border-radius: 12px;
            padding: 0.8rem; font-weight: 700; color: #000;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(16,185,129,0.3);
        }
        label { color: rgba(255,255,255,0.4); font-weight: 600; font-size: 0.8rem; letter-spacing: 0.5px; text-transform: uppercase; }
        .client-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: rgba(255,255,255,0.3); text-decoration: none;
            font-size: 0.85rem; transition: all 0.3s;
            padding: 8px 16px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .client-link:hover {
            color: #10b981;
            border-color: rgba(16,185,129,0.2);
            background: rgba(16,185,129,0.04);
            transform: translateY(-1px);
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(16,185,129,0.1); }
            50% { box-shadow: 0 0 25px rgba(16,185,129,0.2); }
        }
        .glow-pulse { animation: pulseGlow 2s infinite; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-dumbbell login-logo"></i>
            <h3 class="mt-2 fw-bold brand-text" style="font-size: 1.6rem;">{{ app_name }}</h3>
            <p style="color: rgba(255,255,255,0.25); font-size: 0.85rem; margin-top: 4px;">Panel pracownika</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert py-2 mb-3" style="border-radius: 10px; font-size: 0.85rem; border: none; background: rgba(16,185,129,0.06); color: #10b981; border-left: 3px solid #10b981;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nazwa użytkownika</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" required autofocus placeholder="Wpisz login">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Hasło</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" required placeholder="Wpisz hasło">
                </div>
            </div>
            <button type="submit" class="btn-login w-100 btn-lg glow-pulse">
                <i class="bi bi-box-arrow-in-right"></i> Zaloguj się
            </button>
        </form>

        <div class="text-center mt-4" style="border-top: 1px solid rgba(16,185,129,0.06); padding-top: 20px;">
            <a href="/client" class="client-link">
                <i class="bi bi-person"></i> Panel klienta <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    (function() {
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        const particles = Array.from({length: 60}, () => ({
            x: Math.random() * W, y: Math.random() * H,
            vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
            r: Math.random() * 3 + 1
        }));
        function draw() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > W) p.vx *= -1;
                if (p.y < 0 || p.y > H) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(16,185,129,0.2)'; ctx.fill();
            });
            particles.forEach((a, i) => {
                particles.slice(i + 1).forEach(b => {
                    const dx = a.x - b.x, dy = a.y - b.y, d = Math.sqrt(dx*dx + dy*dy);
                    if (d < 180) {
                        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
                        ctx.strokeStyle = `rgba(16,185,129,${0.03 * (1 - d/180)})`;
                        ctx.lineWidth = 0.5; ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(draw);
        }
        draw();
        window.addEventListener('resize', resize);
    })();
    </script>
</body>
</html>
